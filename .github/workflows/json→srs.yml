name: Config Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'   # 每天中午 12:00 UTC 执行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ==================== 安装指定 sing-box 版本 ====================
      - name: Setup sing-box v1.14.0-alpha.36
        run: |
          wget -q https://github.com/SagerNet/sing-box/releases/download/v1.14.0-alpha.36/sing-box-1.14.0-alpha.36-linux-amd64.tar.gz -O sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*-linux-amd64/sing-box /usr/local/bin/sing-box
          sing-box version

      # ==================== 下载 AdGuard 规则 ====================
      - name: Download ablock
        run: |
          mkdir -p rule
          URL="https://github.com/Harrykane-der/my-rules/raw/refs/heads/main/ablock.json"
          curl -L -o rule/ablock.txt "$URL"
          echo "Downloaded: $(wc -l rule/ablock.txt) lines"

      # ==================== 转换 AdGuard → sing-box rule-set ====================
      - name: Convert AdGuard to sing-box rule-set (version 5)
        run: |
          # 编译成 .srs
          sing-box rule-set compile \
            --output rule/ablock.srs \
            rule/ablock.json

          echo "✅ Conversion completed: ablock.json + ablock.srs"

      # ==================== 提交更新 ====================
      - name: Commit and push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          git add rule/ablock.json rule/ablock.srs

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update AdGuard rules - $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Rules updated and pushed"
          fi
