name: Compile Sing-box Rule Sets

on:
  push:
    branches: [main, master]
    paths:
      - "local/**/*.json"

  pull_request:
    branches: [main, master]
    paths:
      - "local/**/*.json"

  workflow_dispatch:

  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 sing-box v1.14.0-alpha.36
        run: |
          set -e
          wget -q https://github.com/SagerNet/sing-box/releases/download/v1.14.0-alpha.36/sing-box-1.14.0-alpha.36-linux-amd64.tar.gz -O sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/sing-box
          sudo chmod +x /usr/local/bin/sing-box

          sing-box version

      - name: 编译 JSON → SRS
        run: |
          set -e

          rm -rf compiled-rules
          mkdir -p compiled-rules

          echo "检查 local 目录..."
          ls -R local || true

          count=$(find local -type f -name "*.json" | wc -l)
          echo "JSON 数量: $count"

          if [ "$count" -eq 0 ]; then
            echo "❌ 没有 JSON 文件，退出"
            exit 1
          fi

          find local -type f -name "*.json" -print0 |
          while IFS= read -r -d '' json_file; do

            srs_file="compiled-rules/${json_file#local/}"
            srs_file="${srs_file%.json}.srs"

            mkdir -p "$(dirname "$srs_file")"

            echo "编译: $json_file -> $srs_file"

            sing-box rule-set compile \
              --output "$srs_file" \
              "$json_file"

          done

          echo "编译完成"
          find compiled-rules -name "*.srs" | sort

      - name: 发布到 releases 分支
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ ! -d "compiled-rules" ] || [ -z "$(ls -A compiled-rules 2>/dev/null)" ]; then
            echo "没有编译产物，跳过"
            exit 0
          fi

          git fetch origin

          if git ls-remote --exit-code --heads origin releases; then
            git checkout releases
            git pull origin releases
          else
            git checkout --orphan releases
          fi

          # =========================
          # ❗关键修复：不清空整个仓库
          # =========================

          # 如果旧 compiled-rules 存在，先删掉旧的
          rm -rf compiled-rules

          # 覆盖写入新的 compiled-rules
          mkdir -p compiled-rules
          cp -a "$GITHUB_WORKSPACE/compiled-rules/." compiled-rules/

          touch .nojekyll

          git add compiled-rules .nojekyll

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Update rule sets"
          git push origin releases
