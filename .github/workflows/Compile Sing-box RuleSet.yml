name: Unified Rule Build (Singbox + Mihomo Release)

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "local/**/*.json"
      - "rule_merger.py"
      - "config.yaml"
      - "**/*.py"

permissions:
  contents: write

concurrency:
  group: unified-rule-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Python
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # =========================
      # Mihomo
      # =========================
      - name: Install Mihomo
        run: |
          set -e
          LATEST_TAG=$(curl -fsSL https://github.com/MetaCubeX/mihomo/releases/latest/download/version.txt)
          curl -fsSL -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/${LATEST_TAG}/mihomo-linux-amd64-${LATEST_TAG}.gz
          gunzip mihomo.gz
          sudo mv mihomo /usr/local/bin/
          chmod +x /usr/local/bin/mihomo
          mihomo -v

      # =========================
      # Sing-box
      # =========================
      - name: Install sing-box
        run: |
          set -e
          VERSION=1.14.0-alpha.36
          curl -fsSL -o sb.tar.gz https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz
          tar -xzf sb.tar.gz
          sudo mv sing-box-${VERSION}-linux-amd64/sing-box /usr/local/bin/
          sing-box version

      # =========================
      # Build rules (python engine)
      # =========================
      - name: Build rules
        run: |
          set -e

          export OUTPUT_DIR="/tmp/release/mihomo"

          echo "OUTPUT_DIR = $OUTPUT_DIR"

          python rule_merger.py

      # =========================
      # Debug check (防空目录崩溃关键)
      # =========================
      - name: Check outputs
        run: |
          echo "===== singbox ====="
          ls -R /tmp/release/singbox || true

          echo "===== mihomo ====="
          ls -R /tmp/release/mihomo || true

      # =========================
      # Publish to release branch
      # =========================
      - name: Publish to release branch
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin

          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git checkout release
            git pull origin release
          else
            git checkout -b release
          fi

          # 清空工作区（保留 git）
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          mkdir -p singbox mihomo

          # =========================
          # singbox output
          # =========================
          if [ -d /tmp/release/singbox ] && [ "$(ls -A /tmp/release/singbox 2>/dev/null)" ]; then
            cp -r /tmp/release/singbox/* singbox/
          else
            echo "⚠️ singbox empty"
          fi

          # =========================
          # mihomo output (关键修复)
          # =========================
          if [ -d /tmp/release/mihomo ] && [ "$(ls -A /tmp/release/mihomo 2>/dev/null)" ]; then
            cp -r /tmp/release/mihomo/* mihomo/
          else
            echo "❌ mihomo empty (check rule_merger output)"
          fi

          # version file
          echo "$(date -u +%Y%m%d-%H%M%S)" > VERSION

          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Unified rule release $(date -u +%Y%m%d-%H%M%S)"
          git push origin release          date -u +"%Y%m%d-%H%M%S" > "$SB_OUT/VERSION"

      # =========================
      # Mihomo rule merger
      # =========================
      - name: Run Mihomo merger
        run: |
          set -e

          export OUTPUT_DIR="/tmp/release/mihomo"
          mkdir -p "$OUTPUT_DIR"

          python rule_merger.py

      # =========================
      # Publish to release branch
      # =========================
      - name: Publish to release branch
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin

          if git show-ref --verify --quiet refs/remotes/origin/release; then
            git checkout release
            git pull origin release
          else
            git checkout -b release
          fi

          # 清空旧内容（保留 git）
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          # 创建目录结构
          mkdir -p singbox mihomo

          # 写入构建结果
          cp -r /tmp/release/singbox/* singbox/
          cp -r /tmp/release/mihomo/* mihomo/

          # 提交
          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Unified rule update $(date -u +%Y%m%d-%H%M%S)"
          git push origin release
