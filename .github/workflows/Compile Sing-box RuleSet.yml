name: Compile Sing-box Rule Sets

on:
  push:
    branches: [main, master]
    paths:
      - "local/**/*.json"

  pull_request:
    branches: [main, master]
    paths:
      - "local/**/*.json"

  workflow_dispatch:

  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 sing-box v1.14.0-alpha.36
        run: |
          set -e
          wget -q https://github.com/SagerNet/sing-box/releases/download/v1.14.0-alpha.36/sing-box-1.14.0-alpha.36-linux-amd64.tar.gz -O sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/sing-box
          sudo chmod +x /usr/local/bin/sing-box
          sing-box version

      - name: 编译 JSON → SRS
        run: |
          set -e

          rm -rf compiled-rules
          mkdir -p compiled-rules

          echo "检查 local 目录..."
          ls -R local || true

          mapfile -d '' files < <(find local -type f -name "*.json" -print0)

          echo "JSON 数量: ${#files[@]}"

          if [ ${#files[@]} -eq 0 ]; then
            echo "❌ 没有 JSON 文件"
            exit 1
          fi

          for json_file in "${files[@]}"; do
            srs_file="compiled-rules/${json_file#local/}"
            srs_file="${srs_file%.json}.srs"

            mkdir -p "$(dirname "$srs_file")"

            echo "编译: $json_file -> $srs_file"

            if ! sing-box rule-set compile \
              --output "$srs_file" \
              "$json_file"; then
              echo "❌ 编译失败: $json_file"
              exit 1
            fi
          done

          echo "编译完成"
          find compiled-rules -name "*.srs" | sort

      - name: 推送到 my-rules 分支
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/rules
          mkdir -p /tmp/rules

          cp -r compiled-rules/. /tmp/rules/

          git fetch origin

          # 切换或创建 my-rules 分支
          if git show-ref --verify --quiet refs/remotes/origin/my-rules; then
            git checkout my-rules
            git pull origin my-rules
          else
            git checkout --orphan my-rules
          fi

          # 清空旧内容（保留 .git）
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          cp -r /tmp/rules/. .

          touch .nojekyll

          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update rule sets"
          git push origin my-rules --force
